<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Language</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        h2 {
            margin-bottom: 15px;
            font-weight: 600;
            color: #f1f5f9;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #020617;
            color: #e2e8f0;
            border: 1px solid #1e293b;
            transition: 0.2s;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .primary-btn {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
        }

        .primary-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .secondary-btn {
            background: #1e293b;
            color: #e2e8f0;
        }

        .secondary-btn:hover {
            background: #334155;
        }

        .divider {
            margin: 25px 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        #responseBox {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #020617;
            border: 1px solid #1e293b;
            min-height: 60px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .title {
            text-align: center;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Register Gesture</h2>

        <form id="myForm">
            <input type="text" id="inputField" name="gesture" placeholder="Enter gesture label..." required />
            <button class="primary-btn" type="submit">Register</button>
        </form>

        <div class="divider"></div>

        <h2>Detect</h2>

        <button id="fetchBtn" class="secondary-btn">Run Detection</button>

        <div id="responseBox">Response will appear here...</div>
    </div>

    <script>
        // registering
        document.getElementById("myForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);

            try {
                await fetch("http://localhost:8000/register", {
                    method: "POST",
                    body: formData,
                });

                form.reset();
            } catch (error) {
                alert("Error submitting form");
            }
        });

        // Handle fetch button
        document.getElementById("fetchBtn").addEventListener("click", async function () {
            try {
                const response = await fetch("http://localhost:8000/detect");
                const data = await response.json();

                document.getElementById("responseBox").innerText =
                    JSON.stringify(data.text, null, 2);

            } catch (error) {
                document.getElementById("responseBox").innerText =
                    "Error fetching data";
            }
        });
    </script>

</body>

</html>
